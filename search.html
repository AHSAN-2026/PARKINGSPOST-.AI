<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Parking - ParkingSpot AI</title>
  
  <!-- Leaflet Map CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  
  <!-- Global Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
  <!-- Responsive Stylesheet -->
  <link rel="stylesheet" href="css/responsive.css">
  
  <style>
    /* Split Layout Styles for Map/Search */
    .search-layout {
      display: flex;
      height: calc(100vh - 80px); /* 80px navbar */
      overflow: hidden;
    }
    
    .search-sidebar {
      width: 460px;
      flex-shrink: 0;
      border-right: var(--border-grid);
      display: flex;
      flex-direction: column;
      background-color: var(--bg-primary);
    }
    
    .filter-panel {
      padding: 1.5rem;
      border-bottom: var(--border-grid);
      background-color: var(--bg-primary);
    }
    
    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-top: 0.75rem;
    }
    
    .list-container {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* Spot Cards style */
    .spot-card {
      background-color: var(--bg-card);
      border: var(--border-grid);
      border-radius: var(--radius-sm);
      padding: 1.25rem;
      cursor: pointer;
      transition: all var(--transition-smooth);
      position: relative;
    }
    .spot-card:hover {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-soft);
    }
    .spot-card.active {
      border-color: var(--color-primary);
      border-width: 2px;
      box-shadow: var(--shadow-hover);
    }
    
    .spot-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    
    .spot-price {
      font-family: var(--font-headings);
      font-weight: 800;
      color: var(--color-primary);
      font-size: 1.1rem;
    }
    
    .spot-card h3 {
      font-size: 1.15rem;
      margin-bottom: 0.25rem;
      text-transform: none; /* Keep names natural */
      letter-spacing: -0.01em;
    }
    
    .spot-address {
      font-size: 0.85rem;
      color: var(--color-secondary);
      margin-bottom: 0.75rem;
    }
    
    .spot-meta {
      display: flex;
      gap: 1.5rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--color-secondary);
      margin-bottom: 1rem;
    }
    
    .spot-actions {
      display: flex;
      gap: 0.75rem;
    }
    
    /* Map Container styling */
    .map-container {
      flex: 1;
      height: 100%;
      background-color: #EAE5DC;
      position: relative;
    }
    
    #map {
      width: 100%;
      height: 100%;
      z-index: 10;
    }
    
    .empty-search-state {
      padding: 3rem 1.5rem;
      text-align: center;
      color: var(--color-secondary);
    }
  </style>
</head>
<body>

  <!-- Dynamic injected Header Navbar -->
  <header></header>

  <!-- Split Screen Layout -->
  <main class="search-layout">
    
    <!-- Sidebar content: Filters & Cards List -->
    <section class="search-sidebar">
      <div class="filter-panel">
        <h2 style="font-size: 1.25rem; margin-bottom: 1rem; letter-spacing: -0.02em;">Find Parking Space</h2>
        
        <div class="form-group" style="margin-bottom: 0.75rem;">
          <input type="text" id="search-input" class="form-input" placeholder="Search by name, street, neighborhood...">
        </div>
        
        <div class="filter-row">
          <div>
            <label class="form-label" for="type-filter" style="font-size: 0.75rem;">Vehicle Type</label>
            <select id="type-filter" class="form-input" style="padding: 0.5rem 0.75rem; font-size: 0.85rem;">
              <option value="all">All Vehicles</option>
              <option value="Car">Cars Only</option>
              <option value="Bike">Bikes Only</option>
            </select>
          </div>
          <div>
            <label class="form-label" for="sort-filter" style="font-size: 0.75rem;">Sort By</label>
            <select id="sort-filter" class="form-input" style="padding: 0.5rem 0.75rem; font-size: 0.85rem;">
              <option value="closest">Distance (Closest)</option>
              <option value="cheapest">Price (Cheapest)</option>
              <option value="available">Availability (Most)</option>
            </select>
          </div>
        </div>
      </div>
      
      <!-- Cards Listings Box -->
      <div id="parking-list" class="list-container">
        <!-- Rendered dynamically by search.js -->
        <div class="flex-center" style="height: 100%; flex-direction: column; color: var(--color-secondary);">
          <div style="font-size: 1.5rem; margin-bottom: 0.5rem; animation: pulse 1.5s infinite">📡</div>
          <span>Syncing with sensor network...</span>
        </div>
      </div>
    </section>
    
    <!-- Interactive Map Layer -->
    <section class="map-container">
      <div id="map"></div>
    </section>

  </main>

  <!-- Leaflet Map JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  
  <!-- JavaScript Controller Files -->
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/map.js"></script>
  <script src="js/search.js"></script>
</body>
</html>
